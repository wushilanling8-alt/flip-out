<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  text-align: center;
  margin-top: 40px;
  font-family: sans-serif;
}

/* カード */
.card {
  font-size: 28px;
  font-weight: bold;
  margin: 5px;
  display: inline-block;
}

/* 色 */
.heart { color: red; }
.diamond { color: blue; }
.club { color: green; }
.spade { color: black; }

/* 裏カード */
.back {
  width: 40px;
  height: 60px;
  background: gray;
  display: inline-block;
  margin: 5px;
  border-radius: 6px;
  cursor: pointer;
}

/* ボタン */
button {
  font-size: 18px;
  padding: 10px 20px;
}
</style>
</head>

<body>

<h2>ボード</h2>
<div id="board"></div>
<br>
<button onclick="next()">めくる</button>

<script>
let deck = [];
let board = [];
let stage = 0;

// デッキ
function make(){
  let s=["♠","♥","♦","♣"];
  let n=["A","K","Q","J","10","9","8","7","6","5","4","3","2"];
  deck=[];
  for(let i=0;i<s.length;i++){
    for(let j=0;j<n.length;j++){
      deck.push(n[j]+s[i]);
    }
  }
}

// シャッフル
function shuffle(){
  for(let i=deck.length-1;i>0;i--){
    let r=Math.floor(Math.random()*(i+1));
    [deck[i],deck[r]]=[deck[r],deck[i]];
  }
}

// 色付け
function colorCard(card){
  if(card.includes("♥")) return `<span class="card heart">${card}</span>`;
  if(card.includes("♦")) return `<span class="card diamond">${card}</span>`;
  if(card.includes("♣")) return `<span class="card club">${card}</span>`;
  if(card.includes("♠")) return `<span class="card spade">${card}</span>`;
  return card;
}

// 表示
function render(){
  let html="";

  // フロップ・ターン
  for(let i=0;i<board.length;i++){
    if(i===4 && stage===2){
      // リバー裏表示
      html += `<div class="back" onclick="revealRiver()"></div>`;
    } else {
      html += colorCard(board[i]);
    }
  }

  document.getElementById("board").innerHTML = html;
}

// 進行
function next(){
  if(stage===0){
    board = deck.slice(0,3); // フロップ
    stage=1;
  }
  else if(stage===1){
    board.push(deck[3]); // ターン
    stage=2;
  }
  else if(stage===2){
    board.push(deck[4]); // リバー（裏で出す）
  }
  else{
    start();
    return;
  }

  render();
}

// リバーめくり
function revealRiver(){
  stage=3;
  render();
}

// 初期化
function start(){
  make();
  shuffle();
  board=[];
  stage=0;
  document.getElementById("board").innerHTML="";
}

start();
</script>

</body>
</html>
