<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  text-align: center;
  margin-top: 40px;
  font-family: sans-serif;
}

.card {
  font-size: 28px;
  font-weight: bold;
  margin: 5px;
  display: inline-block;
}

.heart { color: red; }
.diamond { color: blue; }
.club { color: green; }
.spade { color: black; }

.back {
  width: 40px;
  height: 60px;
  background: gray;
  display: inline-block;
  margin: 5px;
  border-radius: 6px;
  cursor: pointer;
}

button {
  font-size: 18px;
  padding: 10px 20px;
  margin: 10px;
}
</style>
</head>

<body>

<h3>ハンド</h3>
<div id="hand"></div>

<h3>ボード</h3>
<div id="board"></div>

<br>
<button onclick="next()">進行</button>
<button onclick="start()">リスタート</button>

<script>
let deck = [];
let board = [];
let hand = [];
let stage = 0; // 0:配布済み,1:フロップ,2:ターン,3:リバー裏,4:リバー表示

// デッキ
function make(){
  let s=["♠","♥","♦","♣"];
  let n=["A","K","Q","J","10","9","8","7","6","5","4","3","2"];
  deck=[];
  for(let i=0;i<s.length;i++){
    for(let j=0;j<n.length;j++){
      deck.push(n[j]+s[i]);
    }
  }
}

// シャッフル
function shuffle(){
  for(let i=deck.length-1;i>0;i--){
    let r=Math.floor(Math.random()*(i+1));
    [deck[i],deck[r]]=[deck[r],deck[i]];
  }
}

// 色
function colorCard(card){
  if(card.includes("♥")) return `<span class="card heart">${card}</span>`;
  if(card.includes("♦")) return `<span class="card diamond">${card}</span>`;
  if(card.includes("♣")) return `<span class="card club">${card}</span>`;
  if(card.includes("♠")) return `<span class="card spade">${card}</span>`;
  return card;
}

// 描画
function render(){
  // ハンド
  document.getElementById("hand").innerHTML =
    hand.map(c=>colorCard(c)).join(" ");

  // ボード
  let html="";
  for(let i=0;i<board.length;i++){
    if(i===4 && stage===3){
      html += `<div class="back" onclick="revealRiver()"></div>`;
    } else {
      html += colorCard(board[i]);
    }
  }
  document.getElementById("board").innerHTML = html;
}

// 進行
function next(){
  if(stage===0){
    board = deck.slice(2,5); // フロップ（ハンド2枚使ってる）
    stage=1;
  }
  else if(stage===1){
    board.push(deck[5]); // ターン
    stage=2;
  }
  else if(stage===2){
    board.push(deck[6]); // リバー（裏）
    stage=3;
  }
  render();
}

// リバーめくり
function revealRiver(){
  stage=4;
  render();
}

// スタート（制限付き）
function start(){
  // ❗進行中はリスタート禁止
  if(stage!==0 && stage!==4){
    return;
  }

  make();
  shuffle();

  hand = [deck[0], deck[1]]; // 先にハンド配布
  board = [];
  stage = 0;

  render();
}

// 初回
start();
</script>

</body>
</html>
