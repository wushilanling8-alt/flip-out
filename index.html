<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>flip</title>

<style>
body{
  margin:0;
  background:#111;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:sans-serif;
}

.card{
  width:220px;
  height:320px;
  background:#fff;
  border-radius:14px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:42px;
  user-select:none;
  transition:transform .2s;
}

.card:active{
  transform:scale(.96);
}
</style>
</head>

<body>

<div class="card" id="x">?</div>

<script>
let players = document.getElementById("players")
let board = [
  document.getElementById("b1"),
  document.getElementById("b2"),
  document.getElementById("b3"),
  document.getElementById("b4"),
  document.getElementById("b5")
]

let deck = []
let stage = 0

function make(){
  let s=["♠","♥","♦","♣"]
  let n=["A","K","Q","J","10","9","8","7","6","5","4","3","2"]
  deck=[]
  for(let i=0;i<s.length;i++){
    for(let j=0;j<n.length;j++){
      deck.push(n[j]+s[i])
    }
  }
}

function draw(){
  let r=Math.floor(Math.random()*deck.length)
  return deck.splice(r,1)[0]
}

function start(){
  players.innerHTML=""
  make()
  stage=0

  let num=document.getElementById("num").value
  for(let i=0;i<num;i++){
    let p=document.createElement("div")
    p.className="player"

    let c1=document.createElement("div")
    let c2=document.createElement("div")
    c1.className="card"
    c2.className="card"

    c1.innerText=draw()
    c2.innerText=draw()

    p.appendChild(c1)
    p.appendChild(c2)
    players.appendChild(p)
  }

  for(let i=0;i<5;i++){
    board[i].innerText=draw()
    board[i].style.clipPath="inset(0 100% 0 0)"
    board[i].classList.add("hidden")
  }
}

document.body.addEventListener("click", ()=>{
  if(stage===0){
    for(let i=0;i<3;i++){
      board[i].classList.remove("hidden")
      board[i].style.clipPath="none"
    }
    stage=1
  }else if(stage===1){
    board[3].classList.remove("hidden")
    board[3].style.clipPath="none"
    stage=2
  }
})

// リバー絞り
let startX=0

board[4].addEventListener("touchstart",(e)=>{
  startX=e.touches[0].clientX
})

board[4].addEventListener("touchmove",(e)=>{
  if(stage!==2) return

  let moveX=e.touches[0].clientX
  let diff=moveX-startX

  let percent = Math.min(Math.max(diff,0),100)
  board[4].classList.remove("hidden")
  board[4].style.clipPath=`inset(0 ${100-percent}% 0 0)`
})

board[4].addEventListener("touchend",()=>{
  if(stage===2){
    board[4].style.clipPath="none"
    stage=3
  }
})
</script>

</body>
</html>
