<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body {
  font-family: sans-serif;
  text-align: center;
  margin-top: 40px;
}

/* カード見た目 */
.card {
  font-size: 28px;
  font-weight: bold;
  margin: 5px;
}

/* スート色 */
.heart { color: red; }
.diamond { color: blue; }   /* ←ダイヤ青 */
.club { color: green; }
.spade { color: black; }

/* ボタン */
button {
  font-size: 18px;
  padding: 10px 20px;
  margin-top: 20px;
}
</style>
</head>

<body>

<h2>ボード</h2>
<div id="board"></div>

<button onclick="next()">めくる</button>

<script>
let deck = [];
let board = [];
let stage = 0; // 0:未,1:フロップ,2:ターン,3:リバー

// デッキ作成
function make(){
  let s=["♠","♥","♦","♣"];
  let n=["A","K","Q","J","10","9","8","7","6","5","4","3","2"];
  deck=[];
  for(let i=0;i<s.length;i++){
    for(let j=0;j<n.length;j++){
      deck.push(n[j]+s[i]);
    }
  }
}

// シャッフル
function shuffle(){
  for(let i=deck.length-1;i>0;i--){
    let r = Math.floor(Math.random()*(i+1));
    [deck[i],deck[r]]=[deck[r],deck[i]];
  }
}

// 色付け
function colorCard(card){
  if(card.includes("♥")) return `<span class="card heart">${card}</span>`;
  if(card.includes("♦")) return `<span class="card diamond">${card}</span>`;
  if(card.includes("♣")) return `<span class="card club">${card}</span>`;
  if(card.includes("♠")) return `<span class="card spade">${card}</span>`;
  return card;
}

// 表示
function render(){
  document.getElementById("board").innerHTML =
    board.map(c => colorCard(c)).join(" ");
}

// 進行
function next(){
  if(stage === 0){
    board = deck.slice(0,3); // フロップ
    stage = 1;
  }
  else if(stage === 1){
    board.push(deck[3]); // ターン
    stage = 2;
  }
  else if(stage === 2){
    board.push(deck[4]); // リバー
    stage = 3;
  }
  else {
    // リセット
    start();
    return;
  }

  render();
}

// 初期化
function start(){
  make();
  shuffle();
  board = [];
  stage = 0;
  document.getElementById("board").innerHTML = "";
}

// 初回実行
start();
</script>

</body>
</html>
