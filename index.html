<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{
  font-family:sans-serif;
  text-align:center;
  margin-top:30px;
}

/* カードの形 */
.card{
  width:50px;
  height:70px;
  border:2px solid #333;
  border-radius:8px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  font-weight:bold;
  font-size:18px;
  margin:4px;
  background:white;
}

/* 色 */
.heart{color:red;}
.diamond{color:blue;}
.club{color:green;}
.spade{color:black;}

/* 裏 */
.back{
  width:50px;
  height:70px;
  background:#444;
  border-radius:8px;
  display:inline-block;
  margin:4px;
  cursor:pointer;
}

/* UI */
button{
  padding:10px 20px;
  margin:10px;
  font-size:16px;
}
</style>
</head>

<body>

<div id="setup">
  <h3>人数選択</h3>
  <select id="players">
    <option value="2">2人</option>
    <option value="3">3人</option>
    <option value="4">4人</option>
    <option value="5">5人</option>
    <option value="6">6人</option>
  </select>
  <br>
  <button onclick="start()">スタート</button>
</div>

<div id="game" style="display:none;">
  <h3>プレイヤー</h3>
  <div id="hands"></div>

  <h3>ボード</h3>
  <div id="board"></div>

  <button onclick="next()">進行</button>
</div>

<script>
let deck=[], players=[], board=[], stage=0;

// デッキ
function make(){
  let s=["♠","♥","♦","♣"];
  let n=["A","K","Q","J","10","9","8","7","6","5","4","3","2"];
  deck=[];
  for(let i=0;i<s.length;i++){
    for(let j=0;j<n.length;j++){
      deck.push(n[j]+s[i]);
    }
  }
}

// シャッフル
function shuffle(){
  for(let i=deck.length-1;i>0;i--){
    let r=Math.floor(Math.random()*(i+1));
    [deck[i],deck[r]]=[deck[r],deck[i]];
  }
}

// カード表示
function cardHTML(card){
  let cls="card ";
  if(card.includes("♥")) cls+="heart";
  else if(card.includes("♦")) cls+="diamond";
  else if(card.includes("♣")) cls+="club";
  else if(card.includes("♠")) cls+="spade";

  return `<div class="${cls}">${card}</div>`;
}

// スタート
function start(){
  let p = parseInt(document.getElementById("players").value);

  make();
  shuffle();

  players=[];
  board=[];
  stage=0;

  // ハンド配布
  for(let i=0;i<p;i++){
    players.push([deck[i*2], deck[i*2+1]]);
  }

  document.getElementById("setup").style.display="none";
  document.getElementById("game").style.display="block";

  render();
}

// 描画
function render(){
  // ハンド
  let h="";
  players.forEach((pl,i)=>{
    h+=`<div>Player ${i+1}: ${pl.map(cardHTML).join("")}</div>`;
  });
  document.getElementById("hands").innerHTML=h;

  // ボード
  let b="";
  for(let i=0;i<board.length;i++){
    if(i===4 && stage===3){
      b+=`<div class="back" onclick="revealRiver()"></div>`;
    }else{
      b+=cardHTML(board[i]);
    }
  }
  document.getElementById("board").innerHTML=b;
}

// 進行
function next(){
  let used = players.length*2;

  if(stage===0){
    board = deck.slice(used, used+3);
    stage=1;
  }
  else if(stage===1){
    board.push(deck[used+3]);
    stage=2;
  }
  else if(stage===2){
    board.push(deck[used+4]); // リバー裏
    stage=3;
  }

  render();
}

// リバーめくり
function revealRiver(){
  stage=4;
  render();
}
</script>

</body>
</html>
